name: Security Audit

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run audit (production)
        id: audit_prod
        run: |
          if npm audit --omit=dev; then
            echo "vulnerable=false" >> "$GITHUB_OUTPUT"
          else
            echo "vulnerable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run audit (dev)
        id: audit_dev
        run: |
          if npm audit; then
            echo "vulnerable=false" >> "$GITHUB_OUTPUT"
          else
            echo "vulnerable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Try npm audit fix
        if: steps.audit_prod.outputs.vulnerable == 'true' || steps.audit_dev.outputs.vulnerable == 'true'
        run: npm audit fix

      - name: Re-run audit after fix
        if: steps.audit_prod.outputs.vulnerable == 'true' || steps.audit_dev.outputs.vulnerable == 'true'
        run: npm audit

      - name: Commit fix (production vulnerabilities)
        if: steps.audit_prod.outputs.vulnerable == 'true'
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: "package-lock.json"
          default_author: github_actions
          message: "fix(deps): resolve audit advisories"
          push: true

      - name: Commit fix (dev-only vulnerabilities)
        if: steps.audit_prod.outputs.vulnerable == 'false' && steps.audit_dev.outputs.vulnerable == 'true'
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: "package-lock.json"
          default_author: github_actions
          message: "build(deps): resolve audit advisories"
          push: true
