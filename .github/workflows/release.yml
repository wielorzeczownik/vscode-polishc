name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'syntaxes/**'
      - 'snippets/**'
      - 'language-configuration.json'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: release-main
  cancel-in-progress: true

permissions: {}

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      released: ${{ steps.bump.outputs.released }}
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      commit_changes: ${{ steps.bump.outputs.commit_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Determine next version (git-cliff)
        id: cliff_bumped
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff.toml
          args: --bumped-version
        env:
          OUTPUT: bumped-version.txt
          GITHUB_REPO: ${{ github.repository }}

      - name: Bump project version
        id: bump
        shell: bash
        env:
          CLIFF_BUMPED_VERSION: ${{ steps.cliff_bumped.outputs.content }}
        run: bash scripts/bump-version.sh

      - name: Generate release notes (git-cliff)
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.bump.outputs.tag }}
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit, tag, and push
        if: ${{ steps.bump.outputs.released == 'true' && steps.bump.outputs.commit_changes == 'true' }}
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: 'package.json package-lock.json'
          default_author: github_actions
          message: 'chore(release): ${{ steps.bump.outputs.tag }} [skip ci]'
          tag: '${{ steps.bump.outputs.tag }}'
          push: true

      - name: Push tag only
        if: ${{ steps.bump.outputs.released == 'true' && steps.bump.outputs.commit_changes == 'false' }}
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Upload release notes
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-notes
          path: release-notes.md

  build-artifacts:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: vsix
          path: '*.vsix'

  publish-release:
    needs:
      - prepare-release
      - build-artifacts
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download vsix artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: vsix
          path: dist

      - name: Download release notes
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-notes
          path: .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          body_path: release-notes.md
          files: dist/*.vsix
